services:
  app1:
    build: ./app
    image: test-app:v1.0
    restart: always
    expose:
      - "8000"

  app2:
    build: ./app
    image: test-app:v1.0
    restart: always
    expose:
      - "8000"

  proxy:
    image: nginx:1.26.3-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/var/www/static:ro
    depends_on:
      - app1
      - app2
    restart: always
