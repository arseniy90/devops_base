services:
  app:
    build: ./app
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    restart: always

  proxy:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/var/www/static:ro
    depends_on:
      - app
    restart: always
