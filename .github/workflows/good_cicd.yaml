name: Go test project CI/CD

on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Code Quality (Lint)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./hw4_cicd
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: hw4_cicd/go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: hw4_cicd

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./hw4_cicd
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: hw4_cicd/go.mod
      - name: Run Tests with Race Detector
        run: go test -v -race ./...

  coverage:
    name: Run Test Coverage
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./hw4_cicd
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: hw4_cicd/go.mod
      - name: Generate Coverage Report
        run: go test -v -coverprofile=coverage.out ./...
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          path: hw4_cicd/coverage.out

  build:
    name: Build
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./hw4_cicd
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: hw4_cicd/go.mod
      - name: Build Binary
        run: go build -ldflags="-s -w" -v -o app ./cmd/main.go
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: hw4_cicd/app

  security:
    name: Security Scan
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./hw4_cicd
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: hw4_cicd/go.mod
      - name: Run Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
