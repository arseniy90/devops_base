services:
  db:
    image: postgres:18-alpine
    container_name: my_postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - db_network

  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: my_pgadmin
    restart: always
    env_file:
      - .env
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pgadmin_network

networks:
  db_network:
    driver: bridge
  pgadmin_network:
    driver: bridge

volumes:
  pgdata:
  pgadmin_data:
